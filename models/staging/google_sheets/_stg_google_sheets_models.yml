# yaml-language-server: $schema=
version: 2

models:
  - name: stg_google_sheets__budget
    description: >
      Staging model for the budget data loaded from Google Sheets via Fivetran.
      Contains the planned quantity per product and month.
    
    columns:
      - name: _row
        description: "Row number assigned by Fivetran, used as surrogate row identifier."
        tests:
          - not_null
          - unique

      - name: product_id
        description: "Identifier of the product. Foreign key to stg_POSTGRE_PUBLIC__PRODUCTS."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_POSTGRE_PUBLIC__PRODUCTS')
                field: product_id

      - name: quantity
        description: "Budgeted quantity planned for the product in the given month."
        tests:
          - not_null

      - name: month
        description: "Month to which the budget row corresponds. Format: YYYY-MM or month name depending on source."
        tests:
          - not_null

      - name: date_load
        description: "Timestamp of the last Fivetran sync. Renamed from _fivetran_synced."
        tests:
          - not_null

